name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r server/requirements-dev.txt

      - name: Fetch fonts
        run: |
          mkdir -p esphome/fonts
          base="https://github.com/google/fonts/raw/main/apache"
          curl -sSL -o esphome/fonts/RobotoCondensed-Bold.ttf    "$base/robotocondensed/static/RobotoCondensed-Bold.ttf"
          curl -sSL -o esphome/fonts/RobotoCondensed-Regular.ttf "$base/robotocondensed/static/RobotoCondensed-Regular.ttf"
          curl -sSL -o esphome/fonts/RobotoMono-Regular.ttf      "$base/robotomono/static/RobotoMono-Regular.ttf"
          ls -la esphome/fonts/

      - name: Stub ESPHome secrets
        run: |
          cat > esphome/secrets.yaml <<'EOF'
          wifi_ssid: "ci-stub"
          wifi_password: "ci-stub"
          ota_password: "ci-stub"
          EOF

      - name: Lint (ruff + black)
        run: make lint

      - name: Tests (pytest)
        run: make test

      - name: HTML check
        run: make html-check

      - name: ESPHome config validate
        run: make esphome-validate

      - name: Docker image builds
        run: docker build -t doorplate-diy:ci .
