name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r server/requirements-dev.txt

      - name: Fetch fonts
        run: |
          mkdir -p esphome/fonts
          roboto="https://github.com/googlefonts/roboto/raw/main/src/hinted"
          mono="https://github.com/googlefonts/robotomono/raw/main/fonts/ttf"
          curl -fsSL -o esphome/fonts/RobotoCondensed-Bold.ttf    "$roboto/RobotoCondensed-Bold.ttf"
          curl -fsSL -o esphome/fonts/RobotoCondensed-Regular.ttf "$roboto/RobotoCondensed-Regular.ttf"
          curl -fsSL -o esphome/fonts/RobotoMono-Regular.ttf      "$mono/RobotoMono-Regular.ttf"
          file esphome/fonts/*.ttf

      - name: Stub ESPHome secrets
        run: |
          cat > esphome/secrets.yaml <<'EOF'
          wifi_ssid: "ci-stub"
          wifi_password: "ci-stub-pass"
          ota_password: "ci-stub-pass"
          EOF

      - name: Lint (ruff + black)
        run: make lint

      - name: Tests (pytest)
        run: make test

      - name: HTML check
        run: make html-check

      - name: ESPHome config validate
        run: make esphome-validate

      - name: Docker image builds
        run: docker build -t doorplate-diy:ci .
