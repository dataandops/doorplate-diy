<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>doorplate-diy · control panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
  <link id="theme-css" rel="stylesheet" href="/static/themes/ink.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); }
    body { min-height: 100vh; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; border-bottom: var(--divider);
    }
    .brand { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
    .brand span { color: var(--accent); }
    .topbar-meta { display: flex; gap: 14px; align-items: center; font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .theme-picker { font-family: var(--font-mono); font-size: 12px; background: var(--paper-elevated); color: var(--ink); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 8px; }

    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: calc(100vh - 61px); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    .panel { padding: 28px; }
    .panel-left { border-right: var(--divider); }
    .panel-right { background: var(--muted-bg); }

    h2 { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; margin: 0 0 14px; color: var(--muted); }

    .field { margin-bottom: 22px; }
    label { display: block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type=text], input[type=time], select {
      width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 16px;
      background: var(--paper-elevated); color: var(--ink);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    input[type=color] {
      width: 48px; height: 32px; padding: 0; border: 1px solid var(--border); border-radius: var(--radius); background: var(--paper-elevated);
    }
    input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    .segmented { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .segmented button { padding: 10px 18px; background: var(--paper-elevated); color: var(--ink); border: 0; font-family: var(--font-mono); font-size: 13px; cursor: pointer; letter-spacing: 0.06em; }
    .segmented button.on { background: var(--ink); color: var(--paper); }
    .segmented button.on.in-use { background: var(--accent); color: var(--accent-ink); }

    .schedule-row { display: grid; grid-template-columns: 100px 1fr 120px auto; gap: 6px; margin-bottom: 8px; align-items: center; }
    .schedule-row input, .schedule-row select { padding: 8px 10px; font-size: 14px; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--ink); padding: 6px 10px; font-family: var(--font-mono); font-size: 12px; cursor: pointer; border-radius: var(--radius); }
    .btn-ghost:hover { background: var(--ink); color: var(--paper); }

    .source-block { border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 8px; background: var(--paper); }
    .source-row { display: grid; grid-template-columns: 44px 1fr 48px auto; gap: 6px; align-items: center; }
    .source-row input { padding: 8px 10px; font-size: 14px; }
    .source-ics { display: grid; grid-template-columns: 1fr auto; gap: 6px; margin-top: 6px; }
    .source-ics input { padding: 6px 8px; font-size: 12px; font-family: var(--font-mono); }
    .source-status { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
    .source-status.error { color: var(--accent); }
    .source-status.ok::before { content: "\2713  "; }
    .source-test-result { margin-top: 6px; padding: 8px 10px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 11px; line-height: 1.4; }
    .source-test-result.ok { background: var(--muted-bg); border-left: 3px solid #2e7d32; }
    .source-test-result.error { background: var(--muted-bg); border-left: 3px solid var(--accent); color: var(--ink); }
    .source-test-result ul { margin: 4px 0 0; padding-left: 18px; }
    details.sources { border: 1px solid var(--border); border-radius: var(--radius); background: var(--paper-elevated); padding: 10px 12px; }
    details.sources > summary { font-family: var(--font-mono); font-size: 12px; cursor: pointer; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 0; }
    details.sources[open] > summary { margin-bottom: 10px; }
    .sources-actions { display: flex; gap: 8px; margin-top: 10px; }
    .custom-labels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .field-hint { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
    .schedule-row.synced input, .schedule-row.synced select { opacity: 0.7; }
    .synced-badge { display: inline-block; padding: 1px 5px; border: 1px solid var(--border); border-radius: 2px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    .btn-primary {
      width: 100%; padding: 16px; margin-top: 12px;
      background: var(--ink); color: var(--paper);
      font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: 0.08em; text-transform: uppercase;
      border: 0; border-radius: var(--radius); cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; }
    .btn-primary:hover:not(:disabled) { background: var(--accent); color: var(--accent-ink); }

    /* Placard preview — mirrors the e-ink layout */
    .placard {
      background: #ffffff; color: #0a0a0a;
      border: 1px solid #0a0a0a;
      padding: 28px 32px; border-radius: var(--radius);
      aspect-ratio: 648 / 480; display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 10px 30px var(--shadow);
      font-family: "DM Sans", sans-serif;
    }
    .placard .title { font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 44px; line-height: 1; letter-spacing: -0.02em; }
    .placard .badge {
      align-self: flex-start;
      padding: 6px 14px; font-family: "DM Mono", monospace; font-weight: 500; font-size: 14px; letter-spacing: 0.12em;
      border: 2px solid #0a0a0a;
      position: relative; overflow: hidden;
    }
    .placard .badge.in-use { color: #ffffff; }
    .placard .badge.anim-pulse  { animation: badge-pulse 1.6s ease-in-out infinite; }
    .placard .badge.anim-blink  { animation: badge-blink 1.0s steps(2) infinite; }
    .placard .badge.anim-scanline::after {
      content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
      background: linear-gradient(transparent 40%, rgba(255,255,255,0.45) 50%, transparent 60%);
      animation: badge-scan 2.2s linear infinite;
      pointer-events: none;
    }
    @keyframes badge-pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.55 } }
    @keyframes badge-blink { 50% { opacity: 0 } }
    @keyframes badge-scan  { 0% { transform: translateY(-100%) } 100% { transform: translateY(100%) } }

    .placard .schedule { display: flex; flex-direction: column; gap: 4px; font-size: 18px; }
    .placard .schedule-line { display: grid; grid-template-columns: auto auto 1fr; gap: 12px; align-items: center; }
    .placard .schedule-empty { color: #7a7a7a; font-style: italic; font-size: 15px; }
    .placard .divider { border-top: 1px solid #0a0a0a; margin: 6px 0; }
    .placard .joke { font-family: "DM Mono", monospace; font-size: 14px; line-height: 1.4; display: flex; flex-direction: column; gap: 4px; }
    .placard .joke .q::before { content: "Q: "; font-weight: 500; }
    .placard .joke .a::before { content: "A: "; font-weight: 500; }
    .placard .footer { margin-top: auto; font-family: "DM Mono", monospace; font-size: 11px; color: #7a7a7a; display: flex; justify-content: space-between; }

    .source-chip {
      display: inline-block; padding: 1px 5px; border-radius: 2px;
      font-family: "DM Mono", monospace; font-size: 11px; color: #fff; letter-spacing: 0.04em; font-weight: 500;
    }

    .joke-card { margin-top: 22px; padding: 18px; background: var(--paper-elevated); border: 1px solid var(--border); border-radius: var(--radius); }
    .joke-card .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .joke-card .title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .joke-card .q, .joke-card .a { font-family: var(--font-mono); font-size: 14px; line-height: 1.5; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 18px; background: var(--ink); color: var(--paper); font-family: var(--font-mono); font-size: 13px; border-radius: var(--radius); opacity: 0; transition: opacity 0.2s; }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--accent); color: var(--accent-ink); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">doorplate<span>·</span>diy</div>
    <div class="topbar-meta">
      <a href="/" class="btn-ghost" title="Back to all rooms">← All rooms</a>
      <span id="api-indicator"></span>
      <span id="room-indicator"></span>
      <select id="theme-picker" class="theme-picker" title="theme"></select>
    </div>
  </header>

  <main class="layout">
    <section class="panel panel-left">
      <h2>Sign Configuration</h2>

      <div class="field">
        <label for="room-name">Room name</label>
        <input id="room-name" type="text" placeholder="Meeting Room" autocomplete="off">
      </div>

      <div class="field">
        <label for="mode-picker">Mode</label>
        <select id="mode-picker"></select>
        <div id="custom-labels" class="custom-labels" hidden>
          <input id="custom-free" type="text" placeholder="When free" maxlength="24">
          <input id="custom-busy" type="text" placeholder="When busy" maxlength="24">
        </div>
      </div>

      <div class="field">
        <label>Status</label>
        <div class="segmented" role="radiogroup">
          <button id="btn-available" type="button">Free</button>
          <button id="btn-in-use" type="button" class="in-use">Busy</button>
        </div>
      </div>

      <div class="field">
        <label for="time-format">Time format</label>
        <select id="time-format">
          <option value="relative">Relative — "3 min ago"</option>
          <option value="24h">24-hour — "17:08"</option>
          <option value="12h">12-hour — "5:08 PM"</option>
          <option value="iso">ISO timestamp</option>
          <option value="off">Off (hide)</option>
        </select>
        <div class="field-hint">Preview updates instantly. The physical sign picks up changes on its next wake (every 15 min by default).</div>
      </div>

      <div class="field">
        <label>Calendar sources</label>
        <details class="sources">
          <summary>Manage sources</summary>
          <div id="source-rows"></div>
          <div class="sources-actions">
            <button id="btn-add-source" class="btn-ghost" type="button">+ Add source</button>
            <button id="btn-refresh-sources" class="btn-ghost" type="button">↻ Refresh now</button>
          </div>
        </details>
      </div>

      <div class="field">
        <label>Schedule</label>
        <div id="schedule-rows"></div>
        <button id="btn-add-row" class="btn-ghost" type="button">+ Add time block</button>
      </div>

      <button id="btn-push" class="btn-primary" type="button">Push to Sign</button>
    </section>

    <section class="panel panel-right">
      <h2>Live Placard Preview</h2>
      <div class="placard" id="placard">
        <div class="title" id="pl-title">Meeting Room</div>
        <div class="badge" id="pl-badge">AVAILABLE</div>
        <div class="schedule" id="pl-schedule"></div>
        <div class="divider"></div>
        <div class="joke">
          <div class="q" id="pl-joke-q"></div>
          <div class="a" id="pl-joke-a"></div>
        </div>
        <div class="footer">
          <span id="pl-updated">—</span>
          <span>doorplate-diy</span>
        </div>
      </div>

      <div class="joke-card">
        <div class="row">
          <span class="title">Current joke</span>
          <button id="btn-shuffle" class="btn-ghost" type="button">Shuffle →</button>
        </div>
        <div class="q" id="jc-q"></div>
        <div class="a" id="jc-a"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = `${window.location.protocol}//${window.location.host}`;
    document.getElementById("api-indicator").textContent = `API: ${API_BASE}`;

    // Which room this control panel is editing. The dashboard links to
    // /room/<id>; we parse the id from the path. Falls back to "default"
    // if the URL is just "/" (lets the legacy bookmark keep working).
    const pathMatch = window.location.pathname.match(/^\/room\/([a-z0-9_-]{1,32})\/?$/);
    let currentRoomId = pathMatch ? pathMatch[1] : "default";
    const statusPath = () => `/status/${encodeURIComponent(currentRoomId)}`;
    const updatePath = () => `/update/${encodeURIComponent(currentRoomId)}`;
    document.getElementById("room-indicator").textContent = `Room: ${currentRoomId}`;

    const state = {
      room_name: "Meeting Room",
      available: true,
      schedule: [],
      joke_q: "", joke_a: "",
      last_updated: null,
      status_label: "AVAILABLE",
      status_animation: "none",
      status_accent: "#c4342a",
      mode: "meeting_room",
      modes: [],
      custom_labels: { free: "AVAILABLE", busy: "IN USE" },
      time_format: "relative",
      time_display: "not pushed yet",
      sources: {},
      theme: "ink",
    };

    // ---------- theme ----------
    // Theme is a per-room property stored on the server (set via POST
    // /update/<room_id>). We populate the picker from /themes, select the
    // room's current theme on load, and POST changes immediately.
    async function loadThemes() {
      const picker = document.getElementById("theme-picker");
      let themes = ["ink"];
      try {
        const res = await fetch(`${API_BASE}/themes`);
        const list = await res.json();
        if (Array.isArray(list) && list.length) themes = list;
      } catch (_) { /* fall back to single theme */ }

      picker.replaceChildren();
      for (const name of themes) {
        const opt = document.createElement("option");
        opt.value = name; opt.textContent = name;
        picker.appendChild(opt);
      }
      // Selection is set in syncThemePicker() once /status responds.
      picker.addEventListener("change", async () => {
        const newTheme = picker.value;
        applyTheme(newTheme);
        try {
          const headers = { "Content-Type": "application/json" };
          const token = localStorage.getItem("doorplateToken");
          if (token) headers["X-Doorplate-Token"] = token;
          const res = await fetch(`${API_BASE}${updatePath()}`, {
            method: "POST",
            headers,
            body: JSON.stringify({ theme: newTheme }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ error: res.status }));
            throw new Error(err.error || res.status);
          }
          state.theme = newTheme;
        } catch (err) {
          toast(`Theme save failed: ${err.message}`, true);
        }
      });
    }

    function applyTheme(name) {
      document.getElementById("theme-css").href = `/static/themes/${name}.css`;
    }

    function syncThemePicker() {
      const picker = document.getElementById("theme-picker");
      if (!picker.options.length) return;
      const want = state.theme || "ink";
      for (const opt of picker.options) opt.selected = (opt.value === want);
      applyTheme(want);
    }

    // ---------- time format ----------
    // Mirrors server-side _format_time and _format_schedule_time so the
    // preview updates instantly when the dropdown changes. Server still
    // renders the canonical values on Push — we just fill in locally until then.
    function formatScheduleTimeClient(hhmm, fmt) {
      if (!hhmm || fmt !== "12h" || !hhmm.includes(":")) return hhmm || "";
      const [hh, mm] = hhmm.split(":");
      const h = parseInt(hh, 10);
      if (isNaN(h)) return hhmm;
      const h12 = ((h + 11) % 12) + 1;
      return `${h12}:${mm} ${h < 12 ? "AM" : "PM"}`;
    }

    function formatTimeClient(isoStr, fmt, now) {
      now = now || new Date();
      if (fmt === "off") return "";
      if (!isoStr) return "not pushed yet";
      const dt = new Date(isoStr);
      if (isNaN(dt.getTime())) return isoStr;
      if (fmt === "iso") return isoStr;
      if (fmt === "24h") {
        return `${String(dt.getHours()).padStart(2, "0")}:${String(dt.getMinutes()).padStart(2, "0")}`;
      }
      if (fmt === "12h") {
        const h = dt.getHours();
        const h12 = ((h + 11) % 12) + 1;
        const m = String(dt.getMinutes()).padStart(2, "0");
        return `${h12}:${m} ${h < 12 ? "AM" : "PM"}`;
      }
      // relative
      const sec = Math.floor((now - dt) / 1000);
      if (sec < 45) return "just now";
      if (sec < 3600) return `${Math.max(1, Math.round(sec / 60))} min ago`;
      if (sec < 86400) return `${Math.max(1, Math.round(sec / 3600))} h ago`;
      const days = Math.floor(sec / 86400);
      if (days <= 7) return days === 1 ? "1 day ago" : `${days} days ago`;
      const h = dt.getHours();
      const h12 = ((h + 11) % 12) + 1;
      const m = String(dt.getMinutes()).padStart(2, "0");
      return `${h12}:${m} ${h < 12 ? "AM" : "PM"}`;
    }

    // ---------- mode ↔ labels ----------
    function currentModeLabels() {
      if (state.mode === "custom") return { free: state.custom_labels.free, busy: state.custom_labels.busy };
      const m = state.modes.find(x => x.key === state.mode);
      return m ? { free: m.free, busy: m.busy } : { free: "FREE", busy: "BUSY" };
    }

    function renderModePicker() {
      const picker = document.getElementById("mode-picker");
      picker.replaceChildren();
      for (const m of state.modes) {
        const opt = document.createElement("option");
        opt.value = m.key;
        opt.textContent = m.label;
        if (m.key === state.mode) opt.selected = true;
        picker.appendChild(opt);
      }
      document.getElementById("custom-labels").hidden = state.mode !== "custom";
      document.getElementById("custom-free").value = state.custom_labels.free || "";
      document.getElementById("custom-busy").value = state.custom_labels.busy || "";
    }

    function renderSegmented() {
      const { free, busy } = currentModeLabels();
      document.getElementById("btn-available").textContent = free || "Free";
      document.getElementById("btn-in-use").textContent = busy || "Busy";
      document.getElementById("btn-available").classList.toggle("on", state.available);
      document.getElementById("btn-in-use").classList.toggle("on", !state.available);
    }

    // ---------- sources ----------
    function renderSourceRows() {
      const container = document.getElementById("source-rows");
      container.replaceChildren();
      for (const [key, cfg] of Object.entries(state.sources)) {
        const block = document.createElement("div");
        block.className = "source-block";

        const row = document.createElement("div");
        row.className = "source-row";

        const shortInput = document.createElement("input");
        shortInput.type = "text";
        shortInput.value = cfg.short || "";
        shortInput.maxLength = 2;
        shortInput.placeholder = "W";
        shortInput.title = "1-2 char badge";
        shortInput.addEventListener("input", (e) => {
          state.sources[key].short = e.target.value.slice(0, 2);
          renderScheduleRows();
          renderPlacard();
        });

        const labelInput = document.createElement("input");
        labelInput.type = "text";
        labelInput.value = cfg.label || "";
        labelInput.placeholder = "Work Calendar";
        labelInput.addEventListener("input", (e) => {
          state.sources[key].label = e.target.value;
        });

        const colorInput = document.createElement("input");
        colorInput.type = "color";
        colorInput.value = cfg.accent || "#0091ea";
        colorInput.addEventListener("input", (e) => {
          state.sources[key].accent = e.target.value;
          renderPlacard();
        });

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "btn-ghost";
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", () => {
          delete state.sources[key];
          state.schedule.forEach(r => { if (r.source === key) delete r.source; });
          renderSourceRows();
          renderScheduleRows();
          renderPlacard();
        });

        row.append(shortInput, labelInput, colorInput, removeBtn);
        block.appendChild(row);

        // ICS URL row + Test button
        const icsWrap = document.createElement("div");
        icsWrap.className = "source-ics";
        const icsInput = document.createElement("input");
        icsInput.type = "url";
        icsInput.value = cfg.ics_url || "";
        icsInput.placeholder = "https:// or webcal:// (optional)";
        icsInput.addEventListener("input", (e) => {
          state.sources[key].ics_url = e.target.value.trim();
        });
        const testBtn = document.createElement("button");
        testBtn.type = "button";
        testBtn.className = "btn-ghost";
        testBtn.textContent = "Test";
        testBtn.title = "Probe this URL without saving";
        testBtn.addEventListener("click", () => testSourceUrl(key, block));
        icsWrap.append(icsInput, testBtn);
        block.appendChild(icsWrap);

        // Status indicator (from last background poll)
        if (cfg.ics_url) {
          const status = document.createElement("div");
          status.className = "source-status";
          if (cfg.last_sync_error) {
            status.classList.add("error");
            status.textContent = `Sync error: ${cfg.last_sync_error}`;
          } else if (cfg.last_synced) {
            status.classList.add("ok");
            status.textContent = `Last synced ${cfg.last_synced}`;
          } else {
            status.textContent = "Not synced yet — Test the URL above, or push config and hit Refresh now.";
          }
          block.appendChild(status);
        }

        // Placeholder for test results
        const testSlot = document.createElement("div");
        testSlot.className = "source-test-slot";
        block.appendChild(testSlot);

        container.appendChild(block);
      }
    }

    async function testSourceUrl(key, block) {
      const url = (state.sources[key] && state.sources[key].ics_url || "").trim();
      const slot = block.querySelector(".source-test-slot");
      slot.replaceChildren();
      if (!url) {
        const box = document.createElement("div");
        box.className = "source-test-result error";
        box.textContent = "Enter a URL first.";
        slot.appendChild(box);
        return;
      }
      const pending = document.createElement("div");
      pending.className = "source-test-result";
      pending.textContent = "Testing…";
      slot.appendChild(pending);
      try {
        const headers = { "Content-Type": "application/json" };
        const token = localStorage.getItem("doorplateToken");
        if (token) headers["X-Doorplate-Token"] = token;
        const res = await fetch(`${API_BASE}/sources/test`, {
          method: "POST",
          headers,
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        slot.replaceChildren();
        const box = document.createElement("div");
        box.className = `source-test-result ${data.ok ? "ok" : "error"}`;
        if (data.ok) {
          const header = document.createElement("div");
          header.textContent = data.event_count === 0
            ? "Connection OK — no events today."
            : `Connection OK — ${data.event_count} event${data.event_count === 1 ? "" : "s"} today:`;
          box.appendChild(header);
          if (data.events && data.events.length) {
            const ul = document.createElement("ul");
            for (const ev of data.events) {
              const li = document.createElement("li");
              li.textContent = `${ev.time}  ${ev.title}`;
              ul.appendChild(li);
            }
            box.appendChild(ul);
          }
        } else {
          box.textContent = data.error || "Unknown error.";
        }
        slot.appendChild(box);
      } catch (err) {
        slot.replaceChildren();
        const box = document.createElement("div");
        box.className = "source-test-result error";
        box.textContent = `Request failed: ${err.message}`;
        slot.appendChild(box);
      }
    }

    async function refreshSources() {
      const btn = document.getElementById("btn-refresh-sources");
      btn.disabled = true;
      btn.textContent = "Refreshing…";
      try {
        const headers = {};
        const token = localStorage.getItem("doorplateToken");
        if (token) headers["X-Doorplate-Token"] = token;
        const res = await fetch(`${API_BASE}/sources/refresh`, { method: "POST", headers });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        Object.assign(state, data);
        render();
        toast("Sources refreshed");
      } catch (err) {
        toast(`Refresh failed: ${err.message}`, true);
      } finally {
        btn.disabled = false;
        btn.textContent = "↻ Refresh now";
      }
    }

    function addSource() {
      // Find a free key
      let idx = Object.keys(state.sources).length + 1;
      let key;
      do { key = `source-${idx++}`; } while (key in state.sources);
      state.sources[key] = { label: "New source", accent: "#0091ea", short: "S" };
      renderSourceRows();
    }

    // ---------- state ↔ UI ----------
    function render() {
      document.getElementById("room-name").value = state.room_name;
      renderModePicker();
      renderSegmented();
      document.getElementById("time-format").value = state.time_format;
      renderSourceRows();
      renderScheduleRows();
      renderPlacard();
      renderJokeCard();
      syncThemePicker();
    }

    function renderScheduleRows() {
      const container = document.getElementById("schedule-rows");
      container.replaceChildren();
      const sourceKeys = Object.keys(state.sources);
      state.schedule.forEach((row, i) => {
        const el = document.createElement("div");
        el.className = "schedule-row";
        const isSynced = row.synced === true;
        if (isSynced) el.classList.add("synced");

        const timeInput = document.createElement("input");
        timeInput.type = "time";
        timeInput.value = row.time || "";
        timeInput.disabled = isSynced;
        timeInput.addEventListener("input", (e) => {
          state.schedule[i].time = e.target.value;
          renderPlacard();
        });

        const titleInput = document.createElement("input");
        titleInput.type = "text";
        titleInput.placeholder = "Meeting title";
        titleInput.value = row.title || "";
        titleInput.disabled = isSynced;
        titleInput.addEventListener("input", (e) => {
          state.schedule[i].title = e.target.value;
          renderPlacard();
        });

        let sourceCell;
        if (isSynced) {
          sourceCell = document.createElement("span");
          sourceCell.className = "synced-badge";
          sourceCell.textContent = "synced";
          sourceCell.title = `Pulled from ${state.sources[row.source]?.label || row.source}`;
        } else {
          sourceCell = document.createElement("select");
          const noneOpt = document.createElement("option");
          noneOpt.value = ""; noneOpt.textContent = "No source";
          sourceCell.appendChild(noneOpt);
          for (const key of sourceKeys) {
            const opt = document.createElement("option");
            opt.value = key;
            opt.textContent = state.sources[key].label || key;
            if (row.source === key) opt.selected = true;
            sourceCell.appendChild(opt);
          }
          sourceCell.addEventListener("change", (e) => {
            if (e.target.value) state.schedule[i].source = e.target.value;
            else delete state.schedule[i].source;
            renderPlacard();
          });
        }

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "btn-ghost";
        removeBtn.textContent = "×";
        removeBtn.disabled = isSynced;
        if (!isSynced) {
          removeBtn.addEventListener("click", () => {
            state.schedule.splice(i, 1);
            renderScheduleRows();
            renderPlacard();
          });
        }

        el.append(timeInput, titleInput, sourceCell, removeBtn);
        container.appendChild(el);
      });
    }

    function renderPlacard() {
      document.getElementById("pl-title").textContent = state.room_name || "—";
      const badge = document.getElementById("pl-badge");
      const { free, busy } = currentModeLabels();
      const label = state.available ? free : busy;
      badge.textContent = label || (state.available ? "FREE" : "BUSY");
      badge.classList.toggle("in-use", !state.available);
      // Reset animation classes
      badge.classList.remove("anim-pulse", "anim-blink", "anim-scanline");
      if (!state.available && state.status_animation && state.status_animation !== "none") {
        badge.classList.add(`anim-${state.status_animation}`);
      }
      if (!state.available) {
        badge.style.background = state.status_accent || "#c4342a";
        badge.style.borderColor = state.status_accent || "#c4342a";
      } else {
        badge.style.background = "";
        badge.style.borderColor = "";
      }

      const sched = document.getElementById("pl-schedule");
      sched.replaceChildren();
      const lines = state.schedule.filter(r => (r.time && r.time.trim()) || (r.title && r.title.trim()));
      if (!lines.length) {
        const empty = document.createElement("div");
        empty.className = "schedule-empty";
        empty.textContent = "No meetings scheduled";
        sched.appendChild(empty);
      } else {
        lines.slice(0, 5).forEach(row => {
          const line = document.createElement("div");
          line.className = "schedule-line";

          const chipSlot = document.createElement("span");
          if (row.source && state.sources[row.source]) {
            const src = state.sources[row.source];
            const chip = document.createElement("span");
            chip.className = "source-chip";
            chip.style.background = src.accent;
            chip.textContent = src.short || "?";
            chipSlot.appendChild(chip);
          }

          const timeSpan = document.createElement("span");
          timeSpan.textContent = formatScheduleTimeClient(row.time || "", state.time_format || "24h");
          const titleSpan = document.createElement("span");
          titleSpan.textContent = row.title || "";
          line.append(chipSlot, timeSpan, titleSpan);
          sched.appendChild(line);
        });
      }

      document.getElementById("pl-joke-q").textContent = state.joke_q || "";
      document.getElementById("pl-joke-a").textContent = state.joke_a || "";
      // Compute locally from current state so the preview reflects dropdown
      // changes immediately, without requiring a push round-trip.
      document.getElementById("pl-updated").textContent = formatTimeClient(
        state.last_updated,
        state.time_format || "relative"
      );
    }

    function renderJokeCard() {
      document.getElementById("jc-q").textContent = state.joke_q ? `Q: ${state.joke_q}` : "";
      document.getElementById("jc-a").textContent = state.joke_a ? `A: ${state.joke_a}` : "";
    }

    // ---------- API ----------
    async function fetchStatus() {
      const res = await fetch(`${API_BASE}${statusPath()}`);
      if (!res.ok) {
        toast(`Room "${currentRoomId}" not found — open the dashboard to pick one`, true);
        return;
      }
      const data = await res.json();
      Object.assign(state, data);
      render();
    }

    function buildPushBody(extra = {}) {
      // Build the schedule payload: filter orphaned sources. Synced items
      // are echoed back with synced:true so the server can drop them —
      // the worker is the source of truth for those.
      const allowed = new Set(Object.keys(state.sources));
      const schedule = state.schedule.map(r => {
        const out = { time: r.time || "", title: r.title || "" };
        if (r.source && allowed.has(r.source)) out.source = r.source;
        if (r.synced === true) out.synced = true;
        return out;
      });
      return {
        room_name: document.getElementById("room-name").value,
        available: state.available,
        mode: state.mode,
        custom_labels: state.custom_labels,
        time_format: state.time_format,
        sources: state.sources,
        schedule,
        ...extra,
      };
    }

    async function pushUpdate(extra = {}) {
      const pushBtn = document.getElementById("btn-push");
      pushBtn.disabled = true;
      try {
        const headers = { "Content-Type": "application/json" };
        const token = localStorage.getItem("doorplateToken");
        if (token) headers["X-Doorplate-Token"] = token;
        const res = await fetch(`${API_BASE}${updatePath()}`, {
          method: "POST",
          headers,
          body: JSON.stringify(buildPushBody(extra)),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.status }));
          throw new Error(err.error || res.status);
        }
        const data = await res.json();
        Object.assign(state, data);
        render();
        toast("Pushed to sign");
      } catch (err) {
        toast(`Push failed: ${err.message}`, true);
      } finally {
        pushBtn.disabled = false;
      }
    }

    // ---------- events ----------
    document.getElementById("room-name").addEventListener("input", (e) => {
      state.room_name = e.target.value;
      renderPlacard();
    });
    document.getElementById("btn-available").addEventListener("click", () => {
      state.available = true;
      renderSegmented();
      renderPlacard();
    });
    document.getElementById("btn-in-use").addEventListener("click", () => {
      state.available = false;
      renderSegmented();
      renderPlacard();
    });
    document.getElementById("mode-picker").addEventListener("change", (e) => {
      state.mode = e.target.value;
      // When switching to a non-custom preset, pull the preset's anim/accent
      // into local state so the preview updates before the next push.
      const m = state.modes.find(x => x.key === state.mode);
      if (m && state.mode !== "custom") {
        // animation + accent aren't on the modes list; server will resolve them on push.
        // For immediate preview, re-fetch after push; for now just re-render labels.
      }
      renderModePicker();
      renderSegmented();
      renderPlacard();
    });
    document.getElementById("custom-free").addEventListener("input", (e) => {
      state.custom_labels.free = e.target.value;
      renderSegmented();
      renderPlacard();
    });
    document.getElementById("custom-busy").addEventListener("input", (e) => {
      state.custom_labels.busy = e.target.value;
      renderSegmented();
      renderPlacard();
    });
    document.getElementById("time-format").addEventListener("change", (e) => {
      state.time_format = e.target.value;
      renderPlacard();
    });
    document.getElementById("btn-add-source").addEventListener("click", () => addSource());
    document.getElementById("btn-refresh-sources").addEventListener("click", () => refreshSources());
    document.getElementById("btn-add-row").addEventListener("click", () => {
      state.schedule.push({ time: "", title: "" });
      renderScheduleRows();
      renderPlacard();
    });
    document.getElementById("btn-push").addEventListener("click", () => pushUpdate());
    document.getElementById("btn-shuffle").addEventListener("click", () => pushUpdate({ new_joke: true }));

    // ---------- toast ----------
    let toastTimer = null;
    function toast(msg, isError = false) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.toggle("error", isError);
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
    }

    // ---------- boot ----------
    (async () => {
      await loadThemes();
      await fetchStatus();
    })();
  </script>
</body>
</html>
