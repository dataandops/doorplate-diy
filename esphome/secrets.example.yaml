# Copy this file to esphome/secrets.yaml and fill in your own values.
# secrets.yaml is gitignored, this template is not.
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"
# OTA updates are protected by this password — set it to anything random
# and keep it somewhere safe. You can re-flash over USB if you lose it.
ota_password: "CHANGE_ME"
